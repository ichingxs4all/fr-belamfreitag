<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>WebMIDI Groovebox – Dial Version</title>

<style>
body{
  background:#0f0f0f;
  color:white;
  font-family:sans-serif;
}

/* ---------- KNOB ---------- */

.knob{
  width:60px;
  height:60px;
  border-radius:50%;
  background:#222;
  position:relative;
  margin:auto;
  cursor:pointer;
}

.knob::after{
  content:'';
  position:absolute;
  width:4px;
  height:22px;
  background:white;
  left:50%;
  top:8px;
  transform-origin:50% 20px;
  transform:translateX(-50%) rotate(-135deg);
}

.knobValue{
  text-align:center;
  font-size:12px;
}

.step{
  display:inline-block;
  background:#1c1c1c;
  padding:6px;
  margin:4px;
  border-radius:8px;
}

.play{ outline:3px solid yellow; }
.off{ opacity:.3; }

.trackHeader{
  margin-top:10px;
}
</style>
</head>

<body>

<h2>Hardware Groovebox (Dial Edition)</h2>

Tempo
<div id="tempoKnob" class="knob"></div>
<div id="tempoVal" class="knobValue">120</div>

Swing
<div id="swingKnob" class="knob"></div>
<div id="swingVal" class="knobValue">0</div>

<br>
<h3>MIDI Devices</h3>

MIDI OUT:
<select id="midiOutSelect"></select>

MIDI IN:
<select id="midiInSelect"></select>

<br><br>

<button id="startBtn">Start</button>
<button id="stopBtn">Stop</button>

<div id="tracks"></div>

<script>
//////////////////////////////////////////////////////////
// AUDIO CLOCK
//////////////////////////////////////////////////////////
const audioCtx=new AudioContext();

//////////////////////////////////////////////////////////
// CONFIG
//////////////////////////////////////////////////////////
const TRACKS=3;
const STEPS=8;
const PPQN=24;

//////////////////////////////////////////////////////////
// STATE
//////////////////////////////////////////////////////////
let bpm=120;
let swing=0;
let phase=0;
let lastTime=0;
let nextClockPulse=0;

//////////////////////////////////////////////////////////
// GENERIC KNOB
//////////////////////////////////////////////////////////

function createKnob(el,min,max,value,onChange){

  let val=value;
  let dragging=false;
  let lastY=0;

  function update(){
    const norm=(val-min)/(max-min);
    const deg=-135 + norm*270;
    el.style.setProperty("--rot",deg);
    el.style.transform=`rotate(${deg}deg)`;
    onChange(val);
  }

  el.onmousedown=e=>{
    dragging=true;
    lastY=e.clientY;
  };

  window.onmouseup=()=>dragging=false;

  window.onmousemove=e=>{
    if(!dragging) return;

    const dy=lastY-e.clientY;
    lastY=e.clientY;

    val+=dy*(max-min)/300;
    val=Math.min(max,Math.max(min,val));
    update();
  };

  el.onwheel=e=>{
    val+=Math.sign(-e.deltaY);
    val=Math.min(max,Math.max(min,val));
    update();
  };

  update();

  return ()=>val;
}

//////////////////////////////////////////////////////////
// SEQUENCE
//////////////////////////////////////////////////////////

const sequence=[];

for(let t=0;t<TRACKS;t++){
  sequence[t]=[];
  for(let s=0;s<STEPS;s++){
    sequence[t][s]={
      note:60+t*4,
      velocity:100,
      enabled:true
    };
  }
}

const trackChannel=new Array(TRACKS).fill(1);

//////////////////////////////////////////////////////////
// BUILD UI
//////////////////////////////////////////////////////////

const tracksDiv=document.getElementById("tracks");

for(let t=0;t<TRACKS;t++){

  const header=document.createElement("div");
  header.className="trackHeader";
  header.innerHTML=
    `<b>Track ${t+1}</b> MIDI CH:
     <input type="number" min="1" max="16" value="1" id="ch-${t}">`;

  tracksDiv.appendChild(header);

  document.getElementById(`ch-${t}`).oninput=e=>{
    trackChannel[t]=parseInt(e.target.value)-1;
  };

  const row=document.createElement("div");

  for(let s=0;s<STEPS;s++){

    const st=document.createElement("div");
    st.className="step";
    st.id=`step-${t}-${s}`;

    const knob=document.createElement("div");
    knob.className="knob";

    const val=document.createElement("div");
    val.className="knobValue";

    createKnob(
      knob,
      36,
      84,
      sequence[t][s].note,
      v=>{
        sequence[t][s].note=Math.round(v);
        val.innerText=Math.round(v);
      }
    );

    const btn=document.createElement("button");
    btn.innerText="ON";
    btn.onclick=()=>{
      sequence[t][s].enabled=!sequence[t][s].enabled;
      st.classList.toggle("off");
    };

    st.appendChild(knob);
    st.appendChild(val);
    st.appendChild(btn);

    row.appendChild(st);
  }

  tracksDiv.appendChild(row);
}

//////////////////////////////////////////////////////////
// GLOBAL KNOBS
//////////////////////////////////////////////////////////

createKnob(
  tempoKnob,
  60,180,120,
  v=>{
    bpm=v;
    tempoVal.innerText=Math.round(v);
  }
);

createKnob(
  swingKnob,
  0,0.5,0,
  v=>{
    swing=v;
    swingVal.innerText=v.toFixed(2);
  }
);

//////////////////////////////////////////////////////////
// MIDI
//////////////////////////////////////////////////////////

//////////////////////////////////////////////////////////
// MIDI INPUT (clock / transport ready)
//////////////////////////////////////////////////////////

function handleMIDIInput(e){

  const status=e.data[0];

  switch(status){

    case 0xFA: // START
      startBtn.click();
      break;

    case 0xFC: // STOP
      stopBtn.click();
      break;

    case 0xF8:
      // clock pulse received
      // ready for PLL sync extension
      break;
  }
}

//////////////////////////////////////////////////////////
// MIDI DEVICE MANAGEMENT
//////////////////////////////////////////////////////////

let midiAccess=null;
let midiOut=null;
let midiIn=null;

async function initMIDI(){

  midiAccess = await navigator.requestMIDIAccess({
    sysex:false
  });

  populateMIDIDevices();

  // detect hotplug
  midiAccess.onstatechange = populateMIDIDevices;
}

function populateMIDIDevices(){

  const outSel=document.getElementById("midiOutSelect");
  const inSel=document.getElementById("midiInSelect");

  outSel.innerHTML="";
  inSel.innerHTML="";

  midiAccess.outputs.forEach(output=>{
    const opt=new Option(output.name,output.id);
    outSel.add(opt);
  });

  midiAccess.inputs.forEach(input=>{
    const opt=new Option(input.name,input.id);
    inSel.add(opt);
  });

  // auto select first devices
  if(!midiOut && midiAccess.outputs.size){
    midiOut=[...midiAccess.outputs.values()][0];
    outSel.value=midiOut.id;
  }

  if(!midiIn && midiAccess.inputs.size){
    setMidiInput([...midiAccess.inputs.values()][0].id);
    inSel.value=midiIn.id;
  }
}

//////////////////////////////////////////////////////////
// DEVICE SELECTION
//////////////////////////////////////////////////////////

document.getElementById("midiOutSelect")
.onchange=e=>{
  midiOut=midiAccess.outputs.get(e.target.value);
};

document.getElementById("midiInSelect")
.onchange=e=>{
  setMidiInput(e.target.value);
};

function setMidiInput(id){

  if(midiIn){
    midiIn.onmidimessage=null;
  }

  midiIn=midiAccess.inputs.get(id);

  if(midiIn){
    midiIn.onmidimessage=handleMIDIInput;
  }
}

//////////////////////////////////////////////////////////
// MIDI SEND
//////////////////////////////////////////////////////////

function midi(msg,time){

  if(!midiOut) return;

  midiOut.send(msg,time*1000);
}

initMIDI();

//////////////////////////////////////////////////////////
// GROOVE OFFSET
//////////////////////////////////////////////////////////

function grooveOffset(step){
  if(step%2===0) return 0;
  return swing*(60/bpm)*0.25;
}

//////////////////////////////////////////////////////////
// STEP ENGINE
//////////////////////////////////////////////////////////

let lastStep=-1;

function trigger(step,time){

  document.querySelectorAll(".step")
    .forEach(e=>e.classList.remove("play"));

  for(let t=0;t<TRACKS;t++){

    const d=sequence[t][step];
    if(!d.enabled) continue;

    const ch=trackChannel[t];

    midi([0x90|ch,d.note,100],time);
    midi([0x80|ch,d.note,0],time+0.12);

    document
      .getElementById(`step-${t}-${step}`)
      .classList.add("play");
  }
}

//////////////////////////////////////////////////////////
// SCHEDULER
//////////////////////////////////////////////////////////

function scheduler(){

  const now=audioCtx.currentTime;
  const dt=now-lastTime;
  lastTime=now;

  phase+=dt/(60/bpm);

  const step=Math.floor(phase*2)%STEPS;

  if(step!==lastStep){
    lastStep=step;
    trigger(step,now+grooveOffset(step));
  }

  const pulseDur=(60/bpm)/PPQN;

  while(nextClockPulse<now+0.1){
    midi([0xF8],nextClockPulse);
    nextClockPulse+=pulseDur;
  }
}

//////////////////////////////////////////////////////////
// TRANSPORT
//////////////////////////////////////////////////////////

let timer;

startBtn.onclick=()=>{
  audioCtx.resume();
  phase=0;
  lastTime=audioCtx.currentTime;
  nextClockPulse=audioCtx.currentTime;
  midi([0xFA],audioCtx.currentTime);
  timer=setInterval(scheduler,25);
};

stopBtn.onclick=()=>{
  clearInterval(timer);
  midi([0xFC],audioCtx.currentTime);
};
</script>

</body>
</html>
