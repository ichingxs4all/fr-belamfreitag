<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pro WebMIDI Sequencer</title>

<style>
body{
  background:#0f0f0f;
  color:white;
  font-family:sans-serif;
}

.controls{
  margin-bottom:15px;
}

.track{
  margin:12px 0;
}

.step{
  display:inline-block;
  background:#1b1b1b;
  border-radius:8px;
  padding:8px;
  margin:4px;
  width:70px;
  text-align:center;
}

.step.play{
  outline:3px solid yellow;
}

.step.off{
  opacity:0.3;
}

.knob{
  width:60px;
}

button{
  margin-top:5px;
}
</style>
</head>

<body>

<h2>PRO WebMIDI Sequencer</h2>

<div class="controls">

MIDI OUT:
<select id="midiSelect"></select>

<br><br>

Tempo:
<input id="tempo" type="range" min="40" max="200" value="120">
<span id="tempoVal">120</span>

<br><br>

<button id="start">Start</button>
<button id="stop">Stop</button>
<button id="save">Save</button>
<button id="load">Load</button>

</div>

<div id="tracks"></div>

<script>
	//////////////////////////////////////////////////////////
	// HARDWARE GRADE CLOCK ENGINE
	//////////////////////////////////////////////////////////

	const audioCtx = new AudioContext();

	const PPQN = 24;
	const STEPS = 8;
	const TRACKS = 3;

	let bpm = 120;
	let swing = 0.0;

	let playing=false;

	let phase = 0;              // musical phase
	let lastTime = 0;
	let nextClockPulse = 0;

	const lookahead = 25;
	const scheduleAhead = 0.12;

	//////////////////////////////////////////////////////////
	// SEQUENCE DATA
	//////////////////////////////////////////////////////////

	const sequence=[];

	for(let t=0;t<TRACKS;t++){
	  sequence[t]=[];
	  for(let s=0;s<STEPS;s++){
	    sequence[t][s]={
	      note:60+t*4,
	      velocity:100,
	      probability:1,
	      enabled:true,
	      channel:t
	    };
	  }
	}

	//////////////////////////////////////////////////////////
	// MIDI
	//////////////////////////////////////////////////////////

	let midiOut=null;

	navigator.requestMIDIAccess().then(access=>{
	  midiOut=[...access.outputs.values()][0];
	});

	function midi(msg,time){
	  if(!midiOut) return;
	  midiOut.send(msg,time*1000);
	}

	//////////////////////////////////////////////////////////
	// MUSICAL TIME
	//////////////////////////////////////////////////////////

	function secondsPerBeat(){
	  return 60/bpm;
	}

	function advancePhase(dt){
	  phase += dt / secondsPerBeat();
	}

	//////////////////////////////////////////////////////////
	// STEP CALCULATION
	//////////////////////////////////////////////////////////

	let lastStep=-1;

	function processSteps(time){

	  const stepFloat = phase * 2; // 8th notes
	  const stepIndex = Math.floor(stepFloat) % STEPS;

	  if(stepIndex === lastStep) return;

	  lastStep = stepIndex;

	  // SWING
	  let swingOffset = 0;
	  if(stepIndex % 2 === 1){
	    swingOffset = swing * secondsPerBeat()*0.25;
	  }

	  scheduleStep(stepIndex,time+swingOffset);
	}

	//////////////////////////////////////////////////////////
	// STEP SCHEDULING
	//////////////////////////////////////////////////////////

	function scheduleStep(step,time){

	  document.querySelectorAll(".step")
	    .forEach(e=>e.classList.remove("play"));

	  for(let t=0;t<TRACKS;t++){

	    const data=sequence[t][step];
	    if(!data.enabled) continue;

	    // probability
	    if(Math.random() > data.probability) continue;

	    midi([0x90|data.channel,data.note,data.velocity],time);
	    midi([0x80|data.channel,data.note,0],time+0.12);

	    const el=document.getElementById(`step-${t}-${step}`);
	    if(el) el.classList.add("play");
	  }
	}

	//////////////////////////////////////////////////////////
	// PHASE LOCKED MIDI CLOCK
	//////////////////////////////////////////////////////////

	function scheduleClock(time){

	  const pulseDur = secondsPerBeat()/PPQN;

	  while(nextClockPulse < time + scheduleAhead){

	    midi([0xF8], nextClockPulse);
	    nextClockPulse += pulseDur;
	  }
	}

	//////////////////////////////////////////////////////////
	// MASTER SCHEDULER
	//////////////////////////////////////////////////////////

	function scheduler(){

	  const now = audioCtx.currentTime;
	  const dt = now - lastTime;
	  lastTime = now;

	  advancePhase(dt);

	  processSteps(now);
	  scheduleClock(now);
	}

	//////////////////////////////////////////////////////////
	// TRANSPORT
	//////////////////////////////////////////////////////////

	let timer;

	function start(){

	  if(playing) return;

	  audioCtx.resume();

	  playing=true;
	  phase=0;
	  lastTime=audioCtx.currentTime;
	  nextClockPulse=audioCtx.currentTime;

	  midi([0xFA],audioCtx.currentTime);

	  timer=setInterval(scheduler,lookahead);
	}

	function stop(){

	  playing=false;
	  clearInterval(timer);

	  midi([0xFC],audioCtx.currentTime);
	}

	//////////////////////////////////////////////////////////
	// UI HOOKS
	//////////////////////////////////////////////////////////

	startBtn.onclick=start;
	stopBtn.onclick=stop;

	tempo.oninput=e=>{
	  bpm=parseFloat(e.target.value);
	};
</script>

</body>
</html>
