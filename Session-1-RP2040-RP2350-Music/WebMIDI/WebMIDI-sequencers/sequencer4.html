<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Elektron Style Web Sequencer</title>

<style>
body{
  background:#101010;
  color:white;
  font-family:sans-serif;
}

.step{
  display:inline-block;
  width:70px;
  background:#222;
  margin:4px;
  padding:6px;
  border-radius:8px;
  cursor:pointer;
  text-align:center;
}

.play{ outline:3px solid yellow; }
.selected{ outline:3px solid cyan; }
.off{ opacity:.3; }
</style>
</head>

<body>

<h2>Elektron-Style WebMIDI Sequencer</h2>

Tempo
<input id="tempo" type="range" min="60" max="180" value="120">
<span id="tempoVal">120</span>

<br><br>

Pitch
<input id="pitchKnob" type="range" min="36" max="84">

Velocity
<input id="velKnob" type="range" min="1" max="127">

Microtime
<input id="microKnob" type="range" min="-0.05" max="0.05" step="0.001">

Condition
<select id="condition">
<option value="ALL">ALL</option>
<option value="1:2">1:2</option>
<option value="2:2">2:2</option>
<option value="FILL">FILL</option>
<option value="%">PROB</option>
</select>

<br><br>

<button id="startBtn">Start</button>
<button id="stopBtn">Stop</button>

<div id="tracks"></div>

<script>
//////////////////////////////////////////////////////////
// AUDIO CLOCK
//////////////////////////////////////////////////////////
const audioCtx=new AudioContext();

//////////////////////////////////////////////////////////
// CONFIG
//////////////////////////////////////////////////////////
const TRACKS=3;
const STEPS=8;
const PPQN=24;

//////////////////////////////////////////////////////////
// STATE
//////////////////////////////////////////////////////////
let bpm=120;
let phase=0;
let lastTime=0;
let playing=false;
let patternLoop=0;
let selectedStep={track:0,step:0};

//////////////////////////////////////////////////////////
// SEQUENCE WITH PARAM LOCKS
//////////////////////////////////////////////////////////

const sequence=[];

for(let t=0;t<TRACKS;t++){
  sequence[t]=[];

  for(let s=0;s<STEPS;s++){
    sequence[t][s]={
      enabled:true,
      note:60+t*4,
      velocity:100,
      micro:0,
      probability:1,
      condition:"ALL",
      channel:t
    };
  }
}

//////////////////////////////////////////////////////////
// BUILD UI
//////////////////////////////////////////////////////////

const tracksDiv=document.getElementById("tracks");

for(let t=0;t<TRACKS;t++){

  const row=document.createElement("div");

  for(let s=0;s<STEPS;s++){

    const st=document.createElement("div");
    st.className="step";
    st.id=`step-${t}-${s}`;
    st.innerText=s+1;

    st.onclick=()=>{
      selectStep(t,s);
    };

    row.appendChild(st);
  }

  tracksDiv.appendChild(row);
}

function selectStep(t,s){

  document.querySelectorAll(".step")
    .forEach(e=>e.classList.remove("selected"));

  selectedStep={track:t,step:s};

  document
    .getElementById(`step-${t}-${s}`)
    .classList.add("selected");

  const d=sequence[t][s];

  pitchKnob.value=d.note;
  velKnob.value=d.velocity;
  microKnob.value=d.micro;
  condition.value=d.condition;
}

//////////////////////////////////////////////////////////
// PARAMETER LOCK WRITES
//////////////////////////////////////////////////////////

pitchKnob.oninput=e=>{
  sequence[selectedStep.track][selectedStep.step].note
    =parseInt(e.target.value);
};

velKnob.oninput=e=>{
  sequence[selectedStep.track][selectedStep.step].velocity
    =parseInt(e.target.value);
};

microKnob.oninput=e=>{
  sequence[selectedStep.track][selectedStep.step].micro
    =parseFloat(e.target.value);
};

condition.onchange=e=>{
  sequence[selectedStep.track][selectedStep.step].condition
    =e.target.value;
};

//////////////////////////////////////////////////////////
// TRIG CONDITIONS
//////////////////////////////////////////////////////////

function conditionPass(step){

  switch(step.condition){

    case "ALL": return true;

    case "1:2":
      return patternLoop%2===0;

    case "2:2":
      return patternLoop%2===1;

    case "%":
      return Math.random()<step.probability;

    case "FILL":
      return fillMode;

    default:
      return true;
  }
}

//////////////////////////////////////////////////////////
// MIDI
//////////////////////////////////////////////////////////

let midiOut;

navigator.requestMIDIAccess().then(a=>{
  midiOut=[...a.outputs.values()][0];
});

function midi(msg,time){
  if(midiOut)
    midiOut.send(msg,time*1000);
}

//////////////////////////////////////////////////////////
// STEP ENGINE
//////////////////////////////////////////////////////////

let lastStep=-1;

function triggerStep(stepIndex,time){

  document.querySelectorAll(".step")
    .forEach(e=>e.classList.remove("play"));

  for(let t=0;t<TRACKS;t++){

    const d=sequence[t][stepIndex];

    if(!d.enabled) continue;
    if(!conditionPass(d)) continue;

    const ttime=time+d.micro;

    midi([0x90|d.channel,d.note,d.velocity],ttime);
    midi([0x80|d.channel,d.note,0],ttime+0.12);

    document
      .getElementById(`step-${t}-${stepIndex}`)
      .classList.add("play");
  }
}

//////////////////////////////////////////////////////////
// SCHEDULER
//////////////////////////////////////////////////////////

function scheduler(){

  const now=audioCtx.currentTime;
  const dt=now-lastTime;
  lastTime=now;

  phase+=dt/(60/bpm);

  const step=Math.floor(phase*2)%STEPS;

  if(step!==lastStep){

    if(step===0) patternLoop++;

    lastStep=step;
    triggerStep(step,now);
  }
}

//////////////////////////////////////////////////////////
// TRANSPORT
//////////////////////////////////////////////////////////

let timer;

function start(){

  audioCtx.resume();

  phase=0;
  lastTime=audioCtx.currentTime;
  patternLoop=0;

  midi([0xFA],audioCtx.currentTime);

  timer=setInterval(scheduler,25);
}

function stop(){
  clearInterval(timer);
  midi([0xFC],audioCtx.currentTime);
}

startBtn.onclick=start;
stopBtn.onclick=stop;

tempo.oninput=e=>{
  bpm=parseFloat(e.target.value);
  tempoVal.textContent=bpm;
};

selectStep(0,0);
</script>

</body>
</html>
