<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>WebMIDI Groovebox — Jitter Free</title>

<style>
body{
  background:#0f0f0f;
  color:white;
  font-family:sans-serif;
}

.step{
  display:inline-block;
  width:110px;
  background:#1c1c1c;
  margin:4px;
  padding:6px;
  border-radius:8px;
  text-align:center;
}

.play{outline:3px solid yellow;}
.off{opacity:.3;}

.knob{
  width:48px;height:48px;
  border-radius:50%;
  background:#2a2a2a;
  margin:auto;
  position:relative;
  cursor:ns-resize;
  box-shadow:inset 0 0 10px #000;
}

.indicator{
  position:absolute;
  width:3px;height:18px;
  background:white;
  left:50%;top:6px;
  transform-origin:50% 18px;
  transform:translateX(-50%) rotate(-135deg);
}

.knobValue{font-size:10px;color:#aaa;}
.knobLabel{font-size:9px;color:#666;}
.patternBtn{margin:2px;}
.activePattern{background:orange;}
</style>
</head>

<body>

<h2>Performance WebMIDI Groovebox</h2>

MIDI OUT:
<select id="midiOutSel"></select>

<br><br>

Tempo
<div id="tempoKnob"></div>
<div id="tempoVal">120</div>

Swing
<input id="swing" type="range" min="0" max="1" step="0.01" value="0.2">

Groove
<select id="groove">
<option value="straight">Straight</option>
<option value="swing">Swing</option>
<option value="mpc">MPC</option>
<option value="shuffle">Shuffle</option>
<option value="human">Human</option>
</select>

<h3>Patterns</h3>
<div id="patternBar"></div>

<br>
<button id="startBtn">Start</button>
<button id="stopBtn">Stop</button>

<div id="tracks"></div>

<script>
const audioCtx=new AudioContext();

//////////////////////////////////////////////////////////
// CONFIG
//////////////////////////////////////////////////////////
const TRACKS=3;
const STEPS=8;
const PATTERNS=8;
const PPQN=24;

//////////////////////////////////////////////////////////
// STATE
//////////////////////////////////////////////////////////
let bpm=120;
let currentPattern=0;
let queuedPattern=null;

//////////////////////////////////////////////////////////
// PATTERNS
//////////////////////////////////////////////////////////
function newPattern(){
  const p=[];
  for(let t=0;t<TRACKS;t++){
    const tr={channel:t,muted:false,steps:[]};
    for(let s=0;s<STEPS;s++)
      tr.steps.push({
        note:60+t*4,
        velocity:100,
        probability:1,
        enabled:true
      });
    p.push(tr);
  }
  return p;
}

const patterns=[];
for(let i=0;i<PATTERNS;i++)patterns.push(newPattern());
const seq=()=>patterns[currentPattern];

//////////////////////////////////////////////////////////
// KNOB
//////////////////////////////////////////////////////////
function knob(parent,{min,max,value,label,onChange}){

  const wrap=document.createElement("div");
  const k=document.createElement("div");
  const ind=document.createElement("div");
  const val=document.createElement("div");
  const lab=document.createElement("div");

  k.className="knob";
  ind.className="indicator";
  val.className="knobValue";
  lab.className="knobLabel";
  lab.textContent=label;

  k.appendChild(ind);
  wrap.appendChild(k);
  wrap.appendChild(val);
  wrap.appendChild(lab);
  parent.appendChild(wrap);

  let v=value;

  function draw(){
    const deg=((v-min)/(max-min))*270-135;
    ind.style.transform=
      `translateX(-50%) rotate(${deg}deg)`;
    val.textContent=Math.round(v);
  }
  draw();

  let sy,sv;

  k.onmousedown=e=>{
    sy=e.clientY;
    sv=v;

    const move=ev=>{
      const dy=sy-ev.clientY;
      v=Math.min(max,Math.max(min,
        sv+dy*(max-min)/200));
      draw();
      onChange(v);
    };

    const up=()=>{
      window.removeEventListener("mousemove",move);
      window.removeEventListener("mouseup",up);
    };

    window.addEventListener("mousemove",move);
    window.addEventListener("mouseup",up);
  };
}

//////////////////////////////////////////////////////////
// UI BUILD
//////////////////////////////////////////////////////////
const tracksDiv=document.getElementById("tracks");

function buildUI(){

tracksDiv.innerHTML="";
const sequence=seq();

for(let t=0;t<TRACKS;t++){

  const row=document.createElement("div");

  for(let s=0;s<STEPS;s++){

    const st=document.createElement("div");
    st.className="step";
    st.id=`step-${t}-${s}`;

    const step=sequence[t].steps[s];

    knob(st,{
      min:36,max:84,value:step.note,label:"NOTE",
      onChange:v=>step.note=v
    });

    knob(st,{
      min:1,max:127,value:step.velocity,label:"VEL",
      onChange:v=>step.velocity=v
    });

    knob(st,{
      min:0,max:1,value:step.probability,label:"PROB",
      onChange:v=>step.probability=v
    });

    const btn=document.createElement("button");
    btn.textContent="ON";
    btn.onclick=()=>{
      step.enabled=!step.enabled;
      st.classList.toggle("off");
    };

    st.appendChild(btn);
    row.appendChild(st);
  }

  tracksDiv.appendChild(row);
}
}
buildUI();

//////////////////////////////////////////////////////////
// PATTERN BUTTONS
//////////////////////////////////////////////////////////
for(let i=0;i<PATTERNS;i++){
  const b=document.createElement("button");
  b.textContent=i+1;
  b.className="patternBtn";
  b.onclick=()=>queuedPattern=i;
  patternBar.appendChild(b);
}

//////////////////////////////////////////////////////////
// TEMPO
//////////////////////////////////////////////////////////
knob(tempoKnob,{
  min:60,max:180,value:120,label:"BPM",
  onChange:v=>{
    bpm=v;
    tempoVal.textContent=Math.round(v);
  }
});

//////////////////////////////////////////////////////////
// MIDI
//////////////////////////////////////////////////////////
let midiOut=null;

navigator.requestMIDIAccess().then(a=>{
  a.outputs.forEach(o=>midiOutSel.add(new Option(o.name,o.id)));
  midiOut=a.outputs.get(midiOutSel.value);
  midiOutSel.onchange=()=>midiOut=a.outputs.get(midiOutSel.value);
});

function midi(msg,time){
  if(midiOut)midiOut.send(msg,time*1000);
}

//////////////////////////////////////////////////////////
// GROOVE ENGINE
//////////////////////////////////////////////////////////
function grooveOffset(step){

  const mode=groove.value;
  const swingAmt=parseFloat(swing.value);
  const beat=(60/bpm)/2;

  if(step%2===0) return 0;

  switch(mode){

    case "swing":
      return beat*0.33*swingAmt;

    case "mpc":
      return beat*(0.08+0.25*swingAmt);

    case "shuffle":
      return beat*(0.12+0.35*swingAmt);

    case "human":
      return (Math.random()-0.5)*0.02;

    default:
      return 0;
  }
}

//////////////////////////////////////////////////////////
// JITTER FREE CLOCK
//////////////////////////////////////////////////////////
let currentStep=0;
let nextNoteTime=0;

const lookahead=25;
const scheduleAheadTime=0.12;

function stepDur(){
  return (60/bpm)/2;
}

function scheduleStep(step,time){

  const sequence=seq();

  for(let t=0;t<TRACKS;t++){

    const tr=sequence[t];
    const d=tr.steps[step];

    if(!d.enabled)continue;
    if(Math.random()>d.probability)continue;

    const tGrooved=time+grooveOffset(step);

    midi([0x90|tr.channel,d.note,d.velocity],tGrooved);
    midi([0x80|tr.channel,d.note,0],tGrooved+0.12);
  }
}

function advance(){

  nextNoteTime+=stepDur();
  currentStep++;

  if(currentStep>=STEPS){
    currentStep=0;

    if(queuedPattern!==null){
      currentPattern=queuedPattern;
      queuedPattern=null;
      buildUI();
    }
  }
}

function scheduler(){

  while(nextNoteTime<audioCtx.currentTime+scheduleAheadTime){

    scheduleStep(currentStep,nextNoteTime);
    advance();

    const pulseDur=(60/bpm)/PPQN;
    for(let i=0;i<PPQN/2;i++)
      midi([0xF8],nextNoteTime+i*pulseDur);
  }
}

//////////////////////////////////////////////////////////
// TRANSPORT
//////////////////////////////////////////////////////////
let timer;

startBtn.onclick=()=>{
  audioCtx.resume();
  currentStep=0;
  nextNoteTime=audioCtx.currentTime+0.05;
  midi([0xFA],audioCtx.currentTime);
  timer=setInterval(scheduler,lookahead);
};

stopBtn.onclick=()=>{
  clearInterval(timer);
  midi([0xFC],audioCtx.currentTime);
};
</script>

</body>
</html>
