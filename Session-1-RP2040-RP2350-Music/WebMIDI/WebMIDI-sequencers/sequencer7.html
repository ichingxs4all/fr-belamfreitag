<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>WebMIDI Groovebox</title>

<style>
body{
  background:#0f0f0f;
  color:white;
  font-family:sans-serif;
}

/* ================= TRACK ================= */

.trackRow{
  margin-bottom:10px;
}

.trackHeader{
  margin:6px 0;
  font-size:14px;
}

.step{
  display:inline-block;
  width:95px;
  background:#1c1c1c;
  margin:4px;
  padding:6px;
  border-radius:8px;
  text-align:center;
}

.play{ outline:3px solid yellow; }
.off{ opacity:0.3; }

/* ================= KNOB ================= */

.knob{
  width:64px;
  height:64px;
  border-radius:50%;
  background:#2a2a2a;
  position:relative;
  margin:auto;
  box-shadow:
    inset 0 0 12px #000,
    0 3px 6px rgba(0,0,0,0.7);
  cursor:ns-resize;
}

.indicator{
  position:absolute;
  width:4px;
  height:24px;
  background:white;
  left:50%;
  top:8px;
  transform-origin:50% 24px;
  transform:translateX(-50%) rotate(-135deg);
  border-radius:2px;
}

.knobValue{
  font-size:12px;
  color:#aaa;
  margin-top:4px;
}
</style>
</head>

<body>

<h2>Hardware-Grade WebMIDI Groovebox</h2>

MIDI OUT:
<select id="midiOutSel"></select>

MIDI IN:
<select id="midiInSel"></select>

<br><br>

Tempo
<div id="tempoKnob"></div>
<div class="knobValue" id="tempoVal">120</div>

<br>

Swing
<input id="swing" type="range" min="0" max="0.5" step="0.01" value="0">

Groove
<select id="groove">
<option value="straight">Straight</option>
<option value="mpc">MPC</option>
<option value="shuffle">Shuffle</option>
<option value="human">Human</option>
</select>

<br><br>

<button id="startBtn">Start</button>
<button id="stopBtn">Stop</button>

<div id="tracks"></div>

<script>
//////////////////////////////////////////////////////////
// AUDIO
//////////////////////////////////////////////////////////
const audioCtx=new AudioContext();

//////////////////////////////////////////////////////////
// CONFIG
//////////////////////////////////////////////////////////
const TRACKS=3;
const STEPS=8;
const PPQN=24;

//////////////////////////////////////////////////////////
// STATE
//////////////////////////////////////////////////////////
let bpm=120;
let phase=0;
let lastTime=0;
let nextClockPulse=0;

//////////////////////////////////////////////////////////
// KNOB SYSTEM (REAL DIAL BEHAVIOR)
//////////////////////////////////////////////////////////
function createKnob(parent,{min,max,value,onChange,reset}){

  const knob=document.createElement("div");
  knob.className="knob";

  const indicator=document.createElement("div");
  indicator.className="indicator";

  const val=document.createElement("div");
  val.className="knobValue";

  parent.appendChild(knob);
  parent.appendChild(val);

  knob.appendChild(indicator);

  let v=value;

  function render(){
    const deg=((v-min)/(max-min))*270-135;
    indicator.style.transform=
      `translateX(-50%) rotate(${deg}deg)`;
    val.textContent=Math.round(v);
  }

  render();

  let startY,startVal;

  knob.onmousedown=e=>{
    startY=e.clientY;
    startVal=v;

    const move=ev=>{
      const dy=startY-ev.clientY;
      v=Math.min(max,
         Math.max(min,
         startVal + dy*(max-min)/200));

      render();
      onChange(v);
    };

    const up=()=>{
      window.removeEventListener("mousemove",move);
      window.removeEventListener("mouseup",up);
    };

    window.addEventListener("mousemove",move);
    window.addEventListener("mouseup",up);
  };

  knob.ondblclick=()=>{
    if(reset!==undefined){
      v=reset;
      render();
      onChange(v);
    }
  };

  return {
    set(valNew){
      v=valNew;
      render();
    }
  };
}

//////////////////////////////////////////////////////////
// GROOVE
//////////////////////////////////////////////////////////
function grooveOffset(step){

  const g=groove.value;
  const swingAmt=parseFloat(swing.value);
  const beat=60/bpm;

  if(step%2===0) return 0;

  switch(g){
    case "mpc": return beat*0.08+swingAmt*beat*0.25;
    case "shuffle": return beat*0.12+swingAmt*beat*0.3;
    case "human": return (Math.random()-0.5)*0.02;
    default: return swingAmt*beat*0.25;
  }
}

//////////////////////////////////////////////////////////
// SEQUENCE
//////////////////////////////////////////////////////////
const sequence=[];

for(let t=0;t<TRACKS;t++){
  sequence[t]={
    channel:t,     // <<< MIDI CHANNEL PER TRACK
    steps:[]
  };

  for(let s=0;s<STEPS;s++){
    sequence[t].steps[s]={
      note:60+t*4,
      velocity:100,
      probability:1,
      enabled:true
    };
  }
}

//////////////////////////////////////////////////////////
// UI BUILD
//////////////////////////////////////////////////////////
const tracksDiv=document.getElementById("tracks");

for(let t=0;t<TRACKS;t++){

  const row=document.createElement("div");
  row.className="trackRow";

  const header=document.createElement("div");
  header.className="trackHeader";

  header.innerHTML=
    `Track ${t+1} — MIDI CH `;

  const chSel=document.createElement("select");

  for(let c=1;c<=16;c++)
    chSel.add(new Option(c,c-1));

  chSel.value=t;

  chSel.onchange=e=>{
    sequence[t].channel=parseInt(e.target.value);
  };

  header.appendChild(chSel);
  row.appendChild(header);

  for(let s=0;s<STEPS;s++){

    const st=document.createElement("div");
    st.className="step";
    st.id=`step-${t}-${s}`;

    createKnob(st,{
      min:36,
      max:84,
      value:sequence[t].steps[s].note,
      reset:60+t*4,
      onChange:v=>{
        sequence[t].steps[s].note=v;
      }
    });

    const btn=document.createElement("button");
    btn.textContent="ON";
    btn.onclick=()=>{
      sequence[t].steps[s].enabled=
        !sequence[t].steps[s].enabled;
      st.classList.toggle("off");
    };

    st.appendChild(btn);
    row.appendChild(st);
  }

  tracksDiv.appendChild(row);
}

//////////////////////////////////////////////////////////
// TEMPO KNOB
//////////////////////////////////////////////////////////
const tempoControl=createKnob(
  tempoKnob,
  {
    min:60,
    max:180,
    value:120,
    reset:120,
    onChange:v=>{
      bpm=v;
      tempoVal.textContent=Math.round(v);
    }
  }
);

//////////////////////////////////////////////////////////
// MIDI
//////////////////////////////////////////////////////////
let midiOut=null;

navigator.requestMIDIAccess().then(access=>{
  access.outputs.forEach(o=>{
    midiOutSel.add(new Option(o.name,o.id));
  });
  midiOut=access.outputs.get(midiOutSel.value);
  midiOutSel.onchange=
    ()=>midiOut=access.outputs.get(midiOutSel.value);
});

function midi(msg,time){
  if(midiOut)
    midiOut.send(msg,time*1000);
}

//////////////////////////////////////////////////////////
// STEP ENGINE
//////////////////////////////////////////////////////////
let lastStep=-1;

function scheduleStep(step,time){

  document.querySelectorAll(".step")
    .forEach(e=>e.classList.remove("play"));

  for(let t=0;t<TRACKS;t++){

    const track=sequence[t];
    const d=track.steps[step];

    if(!d.enabled) continue;

    midi(
      [0x90|track.channel,d.note,100],
      time
    );

    midi(
      [0x80|track.channel,d.note,0],
      time+0.12
    );

    document
      .getElementById(`step-${t}-${step}`)
      .classList.add("play");
  }
}

//////////////////////////////////////////////////////////
// CLOCK
//////////////////////////////////////////////////////////
function scheduler(){

  const now=audioCtx.currentTime;
  const dt=now-lastTime;
  lastTime=now;

  phase+=dt/(60/bpm);
  const step=Math.floor(phase*2)%STEPS;

  if(step!==lastStep){
    lastStep=step;
    scheduleStep(step,now+grooveOffset(step));
  }

  const pulseDur=(60/bpm)/PPQN;

  while(nextClockPulse<now+0.1){
    midi([0xF8],nextClockPulse);
    nextClockPulse+=pulseDur;
  }
}

//////////////////////////////////////////////////////////
// TRANSPORT
//////////////////////////////////////////////////////////
let timer;

startBtn.onclick=()=>{
  audioCtx.resume();
  phase=0;
  lastTime=audioCtx.currentTime;
  nextClockPulse=audioCtx.currentTime;
  midi([0xFA],audioCtx.currentTime);
  timer=setInterval(scheduler,25);
};

stopBtn.onclick=()=>{
  clearInterval(timer);
  midi([0xFC],audioCtx.currentTime);
};
</script>

</body>
</html>
