<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>WebMIDI Groovebox</title>

<style>
body{
  background:#0f0f0f;
  color:white;
  font-family:sans-serif;
}

.trackRow{
  margin-bottom:14px;
}

.trackHeader{
  margin:6px 0;
}

.step{
  display:inline-block;
  width:110px;
  background:#1c1c1c;
  margin:4px;
  padding:6px;
  border-radius:8px;
  text-align:center;
}

.play{ outline:3px solid yellow; }
.off{ opacity:0.25; }

.knob{
  width:48px;
  height:48px;
  border-radius:50%;
  background:#2a2a2a;
  position:relative;
  margin:2px auto;
  box-shadow:inset 0 0 10px #000;
  cursor:ns-resize;
}

.indicator{
  position:absolute;
  width:3px;
  height:18px;
  background:white;
  left:50%;
  top:6px;
  transform-origin:50% 18px;
  transform:translateX(-50%) rotate(-135deg);
}

.knobValue{
  font-size:10px;
  color:#aaa;
}

.knobLabel{
  font-size:9px;
  color:#666;
}
</style>
</head>

<body>

<h2>Hardware WebMIDI Groovebox</h2>

MIDI OUT:
<select id="midiOutSel"></select>

<br><br>

Tempo
<div id="tempoKnob"></div>
<div id="tempoVal">120</div>

<br><br>

<button id="startBtn">Start</button>
<button id="stopBtn">Stop</button>

<div id="tracks"></div>

<script>
const audioCtx=new AudioContext();

const TRACKS=3;
const STEPS=8;
const PPQN=24;

let bpm=120;
let phase=0;
let lastTime=0;
let nextClockPulse=0;

//////////////////////////////////////////////////////////
// KNOB ENGINE
//////////////////////////////////////////////////////////
function createKnob(parent,{min,max,value,label,reset,onChange}){

  const wrap=document.createElement("div");

  const knob=document.createElement("div");
  knob.className="knob";

  const indicator=document.createElement("div");
  indicator.className="indicator";

  const val=document.createElement("div");
  val.className="knobValue";

  const lab=document.createElement("div");
  lab.className="knobLabel";
  lab.textContent=label;

  knob.appendChild(indicator);
  wrap.appendChild(knob);
  wrap.appendChild(val);
  wrap.appendChild(lab);
  parent.appendChild(wrap);

  let v=value;

  function render(){
    const deg=((v-min)/(max-min))*270-135;
    indicator.style.transform=
      `translateX(-50%) rotate(${deg}deg)`;
    val.textContent=Math.round(v);
  }
  render();

  let startY,startVal;

  knob.onmousedown=e=>{
    startY=e.clientY;
    startVal=v;

    const move=ev=>{
      const dy=startY-ev.clientY;
      v=Math.min(max,
        Math.max(min,
        startVal+dy*(max-min)/200));

      render();
      onChange(v);
    };

    const up=()=>{
      window.removeEventListener("mousemove",move);
      window.removeEventListener("mouseup",up);
    };

    window.addEventListener("mousemove",move);
    window.addEventListener("mouseup",up);
  };

  knob.ondblclick=()=>{
    if(reset!==undefined){
      v=reset;
      render();
      onChange(v);
    }
  };
}

//////////////////////////////////////////////////////////
// SEQUENCE DATA
//////////////////////////////////////////////////////////
const sequence=[];

for(let t=0;t<TRACKS;t++){

  sequence[t]={
    channel:t,
    muted:false,
    steps:[]
  };

  for(let s=0;s<STEPS;s++){
    sequence[t].steps[s]={
      note:60+t*4,
      velocity:100,
      probability:1,
      enabled:true
    };
  }
}

//////////////////////////////////////////////////////////
// BUILD UI
//////////////////////////////////////////////////////////
const tracksDiv=document.getElementById("tracks");

for(let t=0;t<TRACKS;t++){

  const row=document.createElement("div");
  row.className="trackRow";

  const header=document.createElement("div");
  header.className="trackHeader";
  header.innerHTML=`Track ${t+1} CH `;

  const chSel=document.createElement("select");
  for(let i=1;i<=16;i++)
    chSel.add(new Option(i,i-1));
  chSel.value=t;

  chSel.onchange=e=>{
    sequence[t].channel=parseInt(e.target.value);
  };

  const mute=document.createElement("button");
  mute.textContent="Mute";
  mute.onclick=()=>{
    sequence[t].muted=!sequence[t].muted;
    mute.style.background=
      sequence[t].muted?"red":"";
  };

  header.appendChild(chSel);
  header.appendChild(mute);
  row.appendChild(header);

  for(let s=0;s<STEPS;s++){

    const st=document.createElement("div");
    st.className="step";
    st.id=`step-${t}-${s}`;

    const step=sequence[t].steps[s];

    createKnob(st,{
      min:36,max:84,value:step.note,label:"NOTE",
      reset:60+t*4,
      onChange:v=>step.note=v
    });

    createKnob(st,{
      min:1,max:127,value:step.velocity,label:"VEL",
      reset:100,
      onChange:v=>step.velocity=v
    });

    createKnob(st,{
      min:0,max:1,value:1,label:"PROB",
      reset:1,
      onChange:v=>step.probability=v
    });

    const btn=document.createElement("button");
    btn.textContent="ON";
    btn.onclick=()=>{
      step.enabled=!step.enabled;
      st.classList.toggle("off");
    };

    st.appendChild(btn);
    row.appendChild(st);
  }

  tracksDiv.appendChild(row);
}

//////////////////////////////////////////////////////////
// TEMPO
//////////////////////////////////////////////////////////
createKnob(
  tempoKnob,
  {
    min:60,max:180,value:120,label:"BPM",
    reset:120,
    onChange:v=>{
      bpm=v;
      tempoVal.textContent=Math.round(v);
    }
  }
);

//////////////////////////////////////////////////////////
// MIDI
//////////////////////////////////////////////////////////
let midiOut=null;

navigator.requestMIDIAccess().then(access=>{
  access.outputs.forEach(o=>{
    midiOutSel.add(new Option(o.name,o.id));
  });
  midiOut=access.outputs.get(midiOutSel.value);
  midiOutSel.onchange=
    ()=>midiOut=access.outputs.get(midiOutSel.value);
});

function midi(msg,time){
  if(midiOut) midiOut.send(msg,time*1000);
}

//////////////////////////////////////////////////////////
// ENGINE
//////////////////////////////////////////////////////////
let lastStep=-1;

function scheduleStep(step,time){

  document.querySelectorAll(".step")
    .forEach(e=>e.classList.remove("play"));

  for(let t=0;t<TRACKS;t++){

    const track=sequence[t];
    if(track.muted) continue;

    const d=track.steps[step];

    if(!d.enabled) continue;
    if(Math.random()>d.probability) continue;

    midi([0x90|track.channel,d.note,d.velocity],time);
    midi([0x80|track.channel,d.note,0],time+0.12);

    document
      .getElementById(`step-${t}-${step}`)
      .classList.add("play");
  }
}

function scheduler(){

  const now=audioCtx.currentTime;
  const dt=now-lastTime;
  lastTime=now;

  phase+=dt/(60/bpm);
  const step=Math.floor(phase*2)%STEPS;

  if(step!==lastStep){
    lastStep=step;
    scheduleStep(step,now);
  }

  const pulseDur=(60/bpm)/PPQN;

  while(nextClockPulse<now+0.1){
    midi([0xF8],nextClockPulse);
    nextClockPulse+=pulseDur;
  }
}

//////////////////////////////////////////////////////////
// TRANSPORT
//////////////////////////////////////////////////////////
let timer;

startBtn.onclick=()=>{
  audioCtx.resume();
  phase=0;
  lastTime=audioCtx.currentTime;
  nextClockPulse=audioCtx.currentTime;
  midi([0xFA],audioCtx.currentTime);
  timer=setInterval(scheduler,25);
};

stopBtn.onclick=()=>{
  clearInterval(timer);
  midi([0xFC],audioCtx.currentTime);
};
</script>

</body>
</html>
