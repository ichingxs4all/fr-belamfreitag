<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>WebMIDI Performance Groovebox</title>

<style>
body{
  background:#0f0f0f;
  color:white;
  font-family:sans-serif;
}

.step{
  display:inline-block;
  width:110px;
  background:#1c1c1c;
  margin:4px;
  padding:6px;
  border-radius:8px;
  text-align:center;
}

.play{ outline:3px solid yellow; }
.off{ opacity:0.25; }

.knob{
  width:48px;height:48px;
  border-radius:50%;
  background:#2a2a2a;
  position:relative;
  margin:auto;
  box-shadow:inset 0 0 10px #000;
  cursor:ns-resize;
}

.indicator{
  position:absolute;
  width:3px;height:18px;
  background:white;
  left:50%;top:6px;
  transform-origin:50% 18px;
  transform:translateX(-50%) rotate(-135deg);
}

.knobValue{font-size:10px;color:#aaa;}
.knobLabel{font-size:9px;color:#666;}

.patternBtn{
  margin:2px;
}
.activePattern{
  background:orange;
}
</style>
</head>

<body>

<h2>Performance WebMIDI Groovebox</h2>

MIDI OUT:
<select id="midiOutSel"></select>

<br><br>

Tempo
<div id="tempoKnob"></div>
<div id="tempoVal">120</div>

<h3>Patterns</h3>
<div id="patternBar"></div>

<br>

<button id="startBtn">Start</button>
<button id="stopBtn">Stop</button>

<div id="tracks"></div>

<script>
const audioCtx=new AudioContext();

//////////////////////////////////////////////////////////
// CONFIG
//////////////////////////////////////////////////////////
const TRACKS=3;
const STEPS=8;
const PATTERNS=8;
const PPQN=24;

//////////////////////////////////////////////////////////
// STATE
//////////////////////////////////////////////////////////
let bpm=120;
let phase=0;
let lastTime=0;
let nextClockPulse=0;

let currentPattern=0;
let queuedPattern=null;

//////////////////////////////////////////////////////////
// PATTERN DATA
//////////////////////////////////////////////////////////
function createEmptyPattern(){

  const p=[];

  for(let t=0;t<TRACKS;t++){

    const track={
      channel:t,
      muted:false,
      steps:[]
    };

    for(let s=0;s<STEPS;s++){
      track.steps[s]={
        note:60+t*4,
        velocity:100,
        probability:1,
        enabled:true
      };
    }

    p.push(track);
  }

  return p;
}

const patterns=[];
for(let i=0;i<PATTERNS;i++)
  patterns.push(createEmptyPattern());

function seq(){
  return patterns[currentPattern];
}

//////////////////////////////////////////////////////////
// KNOB
//////////////////////////////////////////////////////////
function createKnob(parent,{min,max,value,label,onChange}){

  const wrap=document.createElement("div");

  const knob=document.createElement("div");
  knob.className="knob";

  const ind=document.createElement("div");
  ind.className="indicator";

  const val=document.createElement("div");
  val.className="knobValue";

  const lab=document.createElement("div");
  lab.className="knobLabel";
  lab.textContent=label;

  knob.appendChild(ind);
  wrap.appendChild(knob);
  wrap.appendChild(val);
  wrap.appendChild(lab);
  parent.appendChild(wrap);

  let v=value;

  function render(){
    const deg=((v-min)/(max-min))*270-135;
    ind.style.transform=
      `translateX(-50%) rotate(${deg}deg)`;
    val.textContent=Math.round(v);
  }
  render();

  let startY,startVal;

  knob.onmousedown=e=>{
    startY=e.clientY;
    startVal=v;

    const move=ev=>{
      const dy=startY-ev.clientY;
      v=Math.min(max,
        Math.max(min,
        startVal+dy*(max-min)/200));
      render();
      onChange(v);
    };

    const up=()=>{
      window.removeEventListener("mousemove",move);
      window.removeEventListener("mouseup",up);
    };

    window.addEventListener("mousemove",move);
    window.addEventListener("mouseup",up);
  };
}

//////////////////////////////////////////////////////////
// PATTERN BUTTONS
//////////////////////////////////////////////////////////
const patternBar=document.getElementById("patternBar");

for(let i=0;i<PATTERNS;i++){

  const b=document.createElement("button");
  b.textContent=i+1;
  b.className="patternBtn";

  b.onclick=()=>{
    queuedPattern=i;
  };

  patternBar.appendChild(b);
}

function refreshPatternLights(){
  [...patternBar.children].forEach((b,i)=>{
    b.classList.toggle("activePattern",i===currentPattern);
  });
}
refreshPatternLights();

//////////////////////////////////////////////////////////
// BUILD UI
//////////////////////////////////////////////////////////
const tracksDiv=document.getElementById("tracks");

function buildUI(){

  tracksDiv.innerHTML="";

  const sequence=seq();

  for(let t=0;t<TRACKS;t++){

    const row=document.createElement("div");

    const track=sequence[t];

    for(let s=0;s<STEPS;s++){

      const st=document.createElement("div");
      st.className="step";
      st.id=`step-${t}-${s}`;

      const step=track.steps[s];

      createKnob(st,{
        min:36,max:84,value:step.note,label:"NOTE",
        onChange:v=>step.note=v
      });

      createKnob(st,{
        min:1,max:127,value:step.velocity,label:"VEL",
        onChange:v=>step.velocity=v
      });

      createKnob(st,{
        min:0,max:1,value:1,label:"PROB",
        onChange:v=>step.probability=v
      });

      const btn=document.createElement("button");
      btn.textContent="ON";
      btn.onclick=()=>{
        step.enabled=!step.enabled;
        st.classList.toggle("off");
      };

      st.appendChild(btn);
      row.appendChild(st);
    }

    tracksDiv.appendChild(row);
  }
}

buildUI();

//////////////////////////////////////////////////////////
// TEMPO
//////////////////////////////////////////////////////////
createKnob(tempoKnob,{
  min:60,max:180,value:120,label:"BPM",
  onChange:v=>{
    bpm=v;
    tempoVal.textContent=Math.round(v);
  }
});

//////////////////////////////////////////////////////////
// MIDI
//////////////////////////////////////////////////////////
let midiOut=null;

navigator.requestMIDIAccess().then(access=>{
  access.outputs.forEach(o=>{
    midiOutSel.add(new Option(o.name,o.id));
  });
  midiOut=access.outputs.get(midiOutSel.value);
  midiOutSel.onchange=
    ()=>midiOut=access.outputs.get(midiOutSel.value);
});

function midi(msg,time){
  if(midiOut) midiOut.send(msg,time*1000);
}

//////////////////////////////////////////////////////////
// ENGINE
//////////////////////////////////////////////////////////
let lastStep=-1;

function scheduleStep(step,time){

  const sequence=seq();

  document.querySelectorAll(".step")
    .forEach(e=>e.classList.remove("play"));

  for(let t=0;t<TRACKS;t++){

    const track=sequence[t];
    if(track.muted) continue;

    const d=track.steps[step];
    if(!d.enabled) continue;
    if(Math.random()>d.probability) continue;

    midi([0x90|track.channel,d.note,d.velocity],time);
    midi([0x80|track.channel,d.note,0],time+0.12);

    document
      .getElementById(`step-${t}-${step}`)
      .classList.add("play");
  }
}

function scheduler(){

  const now=audioCtx.currentTime;
  const dt=now-lastTime;
  lastTime=now;

  phase+=dt/(60/bpm);
  const step=Math.floor(phase*2)%STEPS;

  if(step===0 && queuedPattern!==null){
    currentPattern=queuedPattern;
    queuedPattern=null;
    buildUI();
    refreshPatternLights();
  }

  if(step!==lastStep){
    lastStep=step;
    scheduleStep(step,now);
  }

  const pulseDur=(60/bpm)/PPQN;

  while(nextClockPulse<now+0.1){
    midi([0xF8],nextClockPulse);
    nextClockPulse+=pulseDur;
  }
}

//////////////////////////////////////////////////////////
// TRANSPORT
//////////////////////////////////////////////////////////
let timer;

startBtn.onclick=()=>{
  audioCtx.resume();
  phase=0;
  lastTime=audioCtx.currentTime;
  nextClockPulse=audioCtx.currentTime;
  midi([0xFA],audioCtx.currentTime);
  timer=setInterval(scheduler,25);
};

stopBtn.onclick=()=>{
  clearInterval(timer);
  midi([0xFC],audioCtx.currentTime);
};
</script>

</body>
</html>
