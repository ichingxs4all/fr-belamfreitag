<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>WebMIDI Groovebox</title>

<style>
body{
  background:#0f0f0f;
  color:white;
  font-family:sans-serif;
}

.step{
  display:inline-block;
  width:90px;
  background:#1c1c1c;
  margin:4px;
  padding:6px;
  border-radius:8px;
  text-align:center;
}

.play{ outline:3px solid yellow; }
.off{ opacity:0.3; }

/* =========================
   KNOB STYLE
========================= */

.knob{
  width:60px;
  height:60px;
  border-radius:50%;
  background:#2a2a2a;
  position:relative;
  margin:auto;
  box-shadow:
    inset 0 0 10px #000,
    0 3px 6px rgba(0,0,0,0.6);
}

.knob input{
  position:absolute;
  inset:0;
  opacity:0;
  cursor:pointer;
}

.indicator{
  position:absolute;
  width:4px;
  height:22px;
  background:white;
  left:50%;
  top:8px;
  transform-origin:50% 22px;
  transform:translateX(-50%) rotate(-135deg);
  border-radius:2px;
}

.knobValue{
  font-size:12px;
  margin-top:4px;
  color:#aaa;
}
</style>
</head>

<body>

<h2>Hardware-Grade WebMIDI Groovebox</h2>

MIDI OUT:
<select id="midiOutSel"></select>

MIDI IN:
<select id="midiInSel"></select>

<br><br>

Tempo
<div class="knob" id="tempoKnob">
  <div class="indicator"></div>
  <input id="tempo" type="range" min="60" max="180" value="120">
</div>
<div class="knobValue" id="tempoVal">120</div>

<br>

Swing
<input id="swing" type="range" min="0" max="0.5" step="0.01" value="0">

Groove
<select id="groove">
<option value="straight">Straight</option>
<option value="mpc">MPC</option>
<option value="shuffle">Shuffle</option>
<option value="human">Human</option>
</select>

<br><br>

<button id="startBtn">Start</button>
<button id="stopBtn">Stop</button>
<button id="clockModeBtn">Clock: INTERNAL</button>

<div id="tracks"></div>

<script>
//////////////////////////////////////////////////////////
// AUDIO CLOCK
//////////////////////////////////////////////////////////
const audioCtx=new AudioContext();

//////////////////////////////////////////////////////////
// CONFIG
//////////////////////////////////////////////////////////
const TRACKS=3;
const STEPS=8;
const PPQN=24;

const CLOCK_INTERNAL=0;
const CLOCK_EXTERNAL=1;

let clockMode=CLOCK_INTERNAL;

//////////////////////////////////////////////////////////
// STATE
//////////////////////////////////////////////////////////
let bpm=120;
let phase=0;
let playing=false;
let lastTime=0;
let nextClockPulse=0;

//////////////////////////////////////////////////////////
// KNOB ENGINE
//////////////////////////////////////////////////////////
function updateKnob(knob,value,min,max){

  const deg=((value-min)/(max-min))*270-135;

  knob.querySelector(".indicator")
      .style.transform=
      `translateX(-50%) rotate(${deg}deg)`;

  const val=knob.nextElementSibling;
  if(val) val.textContent=Math.round(value);
}

//////////////////////////////////////////////////////////
// GROOVE ENGINE
//////////////////////////////////////////////////////////
function grooveOffset(step){

  const g=document.getElementById("groove").value;
  const swingAmt=parseFloat(swing.value);
  const beat=60/bpm;

  if(step%2===0) return 0;

  switch(g){
    case "mpc": return beat*0.08 + swingAmt*beat*0.25;
    case "shuffle": return beat*0.12 + swingAmt*beat*0.3;
    case "human": return (Math.random()-0.5)*0.02;
    default: return swingAmt*beat*0.25;
  }
}

function humanVelocity(v){
  return Math.max(1,Math.min(127,v+(Math.random()*10-5)));
}

//////////////////////////////////////////////////////////
// SEQUENCE
//////////////////////////////////////////////////////////
const sequence=[];

for(let t=0;t<TRACKS;t++){
  sequence[t]=[];
  for(let s=0;s<STEPS;s++){
    sequence[t][s]={
      note:60+t*4,
      velocity:100,
      probability:1,
      enabled:true,
      channel:t
    };
  }
}

//////////////////////////////////////////////////////////
// UI BUILD
//////////////////////////////////////////////////////////
const tracksDiv=document.getElementById("tracks");

for(let t=0;t<TRACKS;t++){

  const row=document.createElement("div");

  for(let s=0;s<STEPS;s++){

    const st=document.createElement("div");
    st.className="step";
    st.id=`step-${t}-${s}`;

    // ----- KNOB -----
    const knob=document.createElement("div");
    knob.className="knob";

    const indicator=document.createElement("div");
    indicator.className="indicator";

    const pitch=document.createElement("input");
    pitch.type="range";
    pitch.min=36;
    pitch.max=84;
    pitch.value=sequence[t][s].note;

    const value=document.createElement("div");
    value.className="knobValue";

    knob.appendChild(indicator);
    knob.appendChild(pitch);

    st.appendChild(knob);
    st.appendChild(value);

    pitch.oninput=e=>{
      const v=parseFloat(e.target.value);
      sequence[t][s].note=v;
      updateKnob(knob,v,36,84);
    };

    updateKnob(knob,pitch.value,36,84);

    // ON/OFF button
    const btn=document.createElement("button");
    btn.textContent="ON";
    btn.onclick=()=>{
      sequence[t][s].enabled=!sequence[t][s].enabled;
      st.classList.toggle("off");
    };

    st.appendChild(btn);

    row.appendChild(st);
  }

  tracksDiv.appendChild(row);
}

//////////////////////////////////////////////////////////
// MIDI
//////////////////////////////////////////////////////////
let midiOut=null;
let midiIn=null;

navigator.requestMIDIAccess().then(access=>{

  access.outputs.forEach(o=>{
    midiOutSel.add(new Option(o.name,o.id));
  });

  access.inputs.forEach(i=>{
    midiInSel.add(new Option(i.name,i.id));
  });

  midiOut=access.outputs.get(midiOutSel.value);
  midiIn=access.inputs.get(midiInSel.value);

  midiOutSel.onchange=()=>midiOut=access.outputs.get(midiOutSel.value);

  midiInSel.onchange=()=>{
    midiIn=access.inputs.get(midiInSel.value);
    midiIn.onmidimessage=handleMIDIInput;
  };
});

function midi(msg,time){
  if(midiOut)
    midiOut.send(msg,time*1000);
}

//////////////////////////////////////////////////////////
// EXTERNAL CLOCK
//////////////////////////////////////////////////////////
let pll={lastPulse:0,filtered:0,alpha:0.15,locked:false};

function handleMIDIInput(e){

  const now=audioCtx.currentTime;

  switch(e.data[0]){

    case 0xF8:
      if(pll.lastPulse){
        let d=now-pll.lastPulse;
        pll.filtered+=pll.alpha*(d-pll.filtered);
        bpm=60/(pll.filtered*24);
        tempo.value=bpm;
        updateKnob(tempoKnob,bpm,60,180);
      }
      pll.lastPulse=now;
      break;

    case 0xFA: start(); break;
    case 0xFC: stop(); break;
  }
}

//////////////////////////////////////////////////////////
// STEP ENGINE
//////////////////////////////////////////////////////////
let lastStep=-1;

function scheduleStep(step,time){

  document.querySelectorAll(".step")
    .forEach(e=>e.classList.remove("play"));

  for(let t=0;t<TRACKS;t++){

    const d=sequence[t][step];
    if(!d.enabled) continue;
    if(Math.random()>d.probability) continue;

    const vel=humanVelocity(d.velocity);

    midi([0x90|d.channel,d.note,vel],time);
    midi([0x80|d.channel,d.note,0],time+0.12);

    document.getElementById(`step-${t}-${step}`)
      .classList.add("play");
  }
}

//////////////////////////////////////////////////////////
// SCHEDULER
//////////////////////////////////////////////////////////
function scheduler(){

  const now=audioCtx.currentTime;
  const dt=now-lastTime;
  lastTime=now;

  phase+=dt/(60/bpm);
  const step=Math.floor(phase*2)%STEPS;

  if(step!==lastStep){
    lastStep=step;
    scheduleStep(step,now+grooveOffset(step));
  }

  const pulseDur=(60/bpm)/PPQN;

  while(nextClockPulse<now+0.1){
    midi([0xF8],nextClockPulse);
    nextClockPulse+=pulseDur;
  }
}

//////////////////////////////////////////////////////////
// TRANSPORT
//////////////////////////////////////////////////////////
let timer;

function start(){

  audioCtx.resume();

  playing=true;
  phase=0;
  lastTime=audioCtx.currentTime;
  nextClockPulse=audioCtx.currentTime;

  midi([0xFA],audioCtx.currentTime);

  timer=setInterval(scheduler,25);
}

function stop(){
  clearInterval(timer);
  playing=false;
  midi([0xFC],audioCtx.currentTime);
}

startBtn.onclick=start;
stopBtn.onclick=stop;

clockModeBtn.onclick=()=>{
  clockMode=
    clockMode===CLOCK_INTERNAL
    ?CLOCK_EXTERNAL
    :CLOCK_INTERNAL;

  clockModeBtn.textContent=
    "Clock: "+(clockMode===0?"INTERNAL":"EXTERNAL");
};

tempo.oninput=e=>{
  bpm=parseFloat(e.target.value);
  tempoVal.textContent=Math.round(bpm);
  updateKnob(tempoKnob,bpm,60,180);
};

updateKnob(tempoKnob,120,60,180);

</script>

</body>
</html>
