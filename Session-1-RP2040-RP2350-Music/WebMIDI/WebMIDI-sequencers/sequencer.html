<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pro WebMIDI Sequencer</title>

<style>
body{
  background:#0f0f0f;
  color:white;
  font-family:sans-serif;
}

.controls{
  margin-bottom:15px;
}

.track{
  margin:12px 0;
}

.step{
  display:inline-block;
  background:#1b1b1b;
  border-radius:8px;
  padding:8px;
  margin:4px;
  width:70px;
  text-align:center;
}

.step.play{
  outline:3px solid yellow;
}

.step.off{
  opacity:0.3;
}

.knob{
  width:60px;
}

button{
  margin-top:5px;
}
</style>
</head>

<body>

<h2>PRO WebMIDI Sequencer</h2>

<div class="controls">

MIDI OUT:
<select id="midiSelect"></select>

<br><br>

Tempo:
<input id="tempo" type="range" min="40" max="200" value="120">
<span id="tempoVal">120</span>

<br><br>

<button id="start">Start</button>
<button id="stop">Stop</button>
<button id="save">Save</button>
<button id="load">Load</button>

</div>

<div id="tracks"></div>

<script>
////////////////////////////////////////////////////
// AUDIO CLOCK (tight timing)
////////////////////////////////////////////////////
const audioCtx = new AudioContext();

////////////////////////////////////////////////////
// CONFIG
////////////////////////////////////////////////////
const TRACKS = 3;
const STEPS = 8;

////////////////////////////////////////////////////
// STATE
////////////////////////////////////////////////////
let midiOut=null;
let playing=false;
let currentStep=0;
let nextNoteTime=0;
let schedulerTimer;

const scheduleAheadTime = 0.1;
const lookahead = 25;

////////////////////////////////////////////////////
// SEQUENCE DATA
////////////////////////////////////////////////////
const sequence=[];

for(let t=0;t<TRACKS;t++){
  sequence[t]=[];
  for(let s=0;s<STEPS;s++){
    sequence[t][s]={
      note:60+t*4,
      enabled:true,
      channel:t
    };
  }
}

////////////////////////////////////////////////////
// UI BUILD
////////////////////////////////////////////////////
const tracksDiv=document.getElementById("tracks");

for(let t=0;t<TRACKS;t++){

  const tr=document.createElement("div");
  tr.className="track";
  tr.innerHTML="<b>Track "+(t+1)+"</b><br>";

  for(let s=0;s<STEPS;s++){

    const st=document.createElement("div");
    st.className="step";
    st.id=`step-${t}-${s}`;

    const knob=document.createElement("input");
    knob.type="range";
    knob.min=36;
    knob.max=84;
    knob.value=sequence[t][s].note;
    knob.className="knob";

    knob.oninput=e=>{
      sequence[t][s].note=parseInt(e.target.value);
    };

    const btn=document.createElement("button");
    btn.textContent="ON";
    btn.onclick=()=>{
      sequence[t][s].enabled=!sequence[t][s].enabled;
      st.classList.toggle("off");
    };

    st.appendChild(knob);
    st.appendChild(document.createElement("br"));
    st.appendChild(btn);
    tr.appendChild(st);
  }

  tracksDiv.appendChild(tr);
}

////////////////////////////////////////////////////
// WEB MIDI
////////////////////////////////////////////////////
navigator.requestMIDIAccess().then(access=>{

  const select=document.getElementById("midiSelect");

  access.outputs.forEach(out=>{
    const opt=document.createElement("option");
    opt.value=out.id;
    opt.textContent=out.name;
    select.appendChild(opt);
  });

  select.onchange=()=>{
    midiOut=access.outputs.get(select.value);
  };

  midiOut=[...access.outputs.values()][0];
});

function midi(data,time){
  if(!midiOut) return;
  midiOut.send(data, time*1000);
}

////////////////////////////////////////////////////
// TEMPO
////////////////////////////////////////////////////
function tempo(){
  return parseInt(document.getElementById("tempo").value);
}

tempo.oninput=e=>{
  tempoVal.textContent=e.target.value;
};

////////////////////////////////////////////////////
// CLOCK + SCHEDULER
////////////////////////////////////////////////////
function nextStep(){

  const secondsPerBeat = 60/tempo();
  nextNoteTime += secondsPerBeat/2; // 8th notes
  currentStep = (currentStep+1)%STEPS;
}

function scheduleStep(step,time){

  document.querySelectorAll(".step")
    .forEach(s=>s.classList.remove("play"));

  for(let t=0;t<TRACKS;t++){

    const data=sequence[t][step];
    const el=document.getElementById(`step-${t}-${step}`);
    el.classList.add("play");

    if(!data.enabled) continue;

    midi([0x90|data.channel,data.note,100],time);
    midi([0x80|data.channel,data.note,0],time+0.12);
  }
}

function scheduler(){

  while(nextNoteTime < audioCtx.currentTime + scheduleAheadTime){

    scheduleStep(currentStep,nextNoteTime);

    // MIDI clock pulses
    for(let i=0;i<12;i++){
      midi([0xF8], nextNoteTime + i*(60/tempo()/24));
    }

    nextStep();
  }
}

////////////////////////////////////////////////////
// TRANSPORT
////////////////////////////////////////////////////
function startSeq(){

  if(playing) return;

  audioCtx.resume();

  midi([0xFA],audioCtx.currentTime); // start

  playing=true;
  currentStep=0;
  nextNoteTime=audioCtx.currentTime;

  schedulerTimer=setInterval(scheduler,lookahead);
}

function stopSeq(){

  playing=false;
  clearInterval(schedulerTimer);

  midi([0xFC],audioCtx.currentTime);
}

start.onclick=startSeq;
stop.onclick=stopSeq;

////////////////////////////////////////////////////
// SAVE / LOAD
////////////////////////////////////////////////////
save.onclick=()=>{
  localStorage.setItem(
    "sequence",
    JSON.stringify(sequence)
  );
};

load.onclick=()=>{
  const data=JSON.parse(localStorage.getItem("sequence"));
  if(!data) return;

  for(let t=0;t<TRACKS;t++){
    for(let s=0;s<STEPS;s++){
      sequence[t][s]=data[t][s];
    }
  }
  location.reload();
};
</script>

</body>
</html>
